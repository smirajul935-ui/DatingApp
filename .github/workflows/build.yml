name: Android CI (Cloud Build)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Ye direct system gradle use karega, gradlew ki zarurat nahi padegi
    - name: Build APK without Wrapper
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: SecureDating-App
        path: app/build/outputs/apk/debug/app-debug.apk
